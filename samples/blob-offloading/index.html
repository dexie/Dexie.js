<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dexie Cloud — Blob Offloading Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
    h1 { margin-bottom: 8px; color: #e94560; }
    .subtitle { color: #888; margin-bottom: 24px; }
    .drop-zone { border: 2px dashed #444; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 24px; }
    .drop-zone:hover, .drop-zone.dragover { border-color: #e94560; background: rgba(233,69,96,0.1); }
    .drop-zone input { display: none; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .photo-card { background: #16213e; border-radius: 8px; overflow: hidden; }
    .photo-card img { width: 100%; height: 200px; object-fit: cover; }
    .photo-card .info { padding: 12px; }
    .photo-card .title { font-weight: 600; }
    .photo-card .meta { font-size: 12px; color: #888; margin-top: 4px; }
    .photo-card .delete { background: none; border: none; color: #e94560; cursor: pointer; font-size: 12px; margin-top: 8px; }
    .progress-bar { background: #333; border-radius: 4px; height: 4px; margin-bottom: 16px; overflow: hidden; display: none; }
    .progress-bar.active { display: block; }
    .progress-bar .fill { background: #e94560; height: 100%; width: 0; transition: width 0.3s; }
    .status { font-size: 14px; color: #888; margin-bottom: 16px; }
    .auth-section { margin-bottom: 24px; }
    .auth-section button { background: #e94560; border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .auth-section button:hover { background: #c73550; }
    .user-info { font-size: 14px; color: #4ecca3; }
  </style>
</head>
<body>
  <h1>📸 Photo Gallery</h1>
  <p class="subtitle">Dexie Cloud blob offloading demo — images sync across devices</p>

  <div class="auth-section" id="auth">
    <button onclick="login()">Sign In</button>
  </div>

  <div class="progress-bar" id="progress">
    <div class="fill" id="progress-fill"></div>
  </div>
  <div class="status" id="status">Ready</div>

  <div class="drop-zone" id="dropZone" onclick="fileInput.click()">
    <p>📁 Drop images here or click to upload</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="gallery" id="gallery"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
